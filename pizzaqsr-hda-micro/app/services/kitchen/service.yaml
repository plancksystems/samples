
name: "kitchen"
description: "Kitchen ticket queue"
route: "/kitchen*"

tls:
  enabled: false
  cert_file: ""
  key_file: ""

http:
  host: "127.0.0.1"
  port: 3101
  max_connections: 10000
  max_header_size: 8192
  max_body_size: 1048576
  response_buffer_size: 65536
  idle_timeout_ms: 30000
  max_requests_per_connection: 10000
  drain_timeout_ms: 5000

wasm:
  enabled: true
  min_instances: 2
  max_instances: 8
  autoscale: false

upstreams: []
