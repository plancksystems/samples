    <script>
      (function () {
        const HOST = "http://127.0.0.1:";
        const SSE_PORT = 4511;
        const SERVICE_PORTS = {
          "/cart": 3102,
          "/items": 3102,
          "/api/cart/items": 3102,
          "/checkout": 3102,
          "/pay/": 3102,
          "/orders": 3102,
          "/payments/": 3103,
          "/api/products": 3104,
          "/products": 3104,
          "/categories": 3104,
          "/panel/": 3104,
          "/admin/users": 3105,
          "/kitchen": 3101,
          "/delivery": 3100,
        };
        const SSE_PATTERNS = [
          /^\/orders\/[^/]+\/events(\?.*)?$/,
          /^\/kitchen\/events(\?.*)?$/,
          /^\/delivery\/events(\?.*)?$/,
        ];
        function rewrite(path) {
          if (!path.startsWith("/")) return null;
          const q = path.indexOf("?");
          const bare = q >= 0 ? path.slice(0, q) : path;
          for (const re of SSE_PATTERNS) {
            if (re.test(bare)) return HOST + SSE_PORT + path;
          }
          let best = null;
          for (const key of Object.keys(SERVICE_PORTS)) {
            const ok =
              bare === key ||
              bare.startsWith(key + "/") ||
              (key.endsWith("/") && bare.startsWith(key));
            if (ok && (!best || key.length > best.length)) best = key;
          }
          return best ? HOST + SERVICE_PORTS[best] + path : null;
        }
        const ORIGIN = window.location.origin;
        function pathOf(url) {
          if (!url) return null;
          if (url.startsWith("/")) return url;
          if (url.startsWith(ORIGIN + "/")) return url.slice(ORIGIN.length);
          return null;
        }
        const _fetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          const url =
            typeof input === "string"
              ? input
              : input instanceof Request
                ? input.url
                : String(input);
          const path = pathOf(url);
          if (path) {
            const abs = rewrite(path);
            if (abs) {
              input = typeof input === "string" ? abs : new Request(abs, input);
            }
          }
          return _fetch(input, init);
        };
        const _EventSource = window.EventSource;
        window.EventSource = function (url, init) {
          const path = typeof url === "string" ? pathOf(url) : null;
          if (path) {
            const abs = rewrite(path);
            if (abs) url = abs;
          }
          return new _EventSource(url, init);
        };
        window.EventSource.prototype = _EventSource.prototype;
      })();
    </script>

    <script>
      window.mountStripePay = function (orderKey) {
        fetch("/payments/by-order/" + orderKey + "/intent")
          .then(function (r) {
            if (!r.ok) throw new Error("intent fetch failed");
            return r.json();
          })
          .then(function (p) {
            window._stripe = Stripe(p.publishable_key);
            window._elements = window._stripe.elements({
              clientSecret: p.client_secret,
            });
            window._elements.create("payment").mount("#payment-element");
          })
          .catch(function (e) {
            const err = document.getElementById("pay-error");
            if (err)
              err.textContent = "Could not load payment form: " + e.message;
          });
      };

      window.confirmPayment = function (orderKey) {
        const btn = document.getElementById("pay-btn");
        if (btn) btn.disabled = true;
        window._stripe
          .confirmPayment({
            elements: window._elements,
            confirmParams: {
              return_url:
                window.location.origin + "/orders/" + orderKey + "/tracking",
            },
            redirect: "if_required",
          })
          .then(function (r) {
            if (r.error) {
              const err = document.getElementById("pay-error");
              if (err) err.textContent = r.error.message;
              if (btn) btn.disabled = false;
              return;
            }
            return fetch("/orders/" + orderKey + "/tracking")
              .then(function (resp) {
                if (!resp.ok) throw new Error("tracking fetch failed");
                return resp.text();
              })
              .then(function (html) {
                const target = document.getElementById("content");
                if (target) target.outerHTML = html;
              })
              .catch(function (e) {
                const err = document.getElementById("pay-error");
                if (err)
                  err.textContent =
                    "Loaded payment ok but tracking page failed: " + e.message;
              });
          });
      };
    </script>

    <style>
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .fade-in {
        animation: fadeIn 0.2s ease-out;
      }
    </style>

  <body
    class="bg-slate-50 text-slate-800 min-h-screen flex flex-col"
    data-signals="{cartOpen: false}"
  >
    <nav
      class="bg-white border-b border-slate-200 px-4 lg:px-8 py-3 flex items-center justify-between sticky top-0 z-50 shadow-sm"
    >
      <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-2">
          <span class="text-2xl">🍕</span>
          <span class="text-lg font-bold text-blue-700">ePizza</span>
        </a>
      </div>

      <div class="flex items-center gap-3">
        <div
          class="hidden sm:flex items-center bg-slate-100 rounded-lg px-3 py-1.5 w-64"
        >
          <svg
            class="w-4 h-4 text-slate-400 mr-2 shrink-0"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
          <input
            type="text"
            name="q"
            placeholder="Search pizzas, pasta, drinks…"
            class="bg-transparent text-sm w-full outline-none"
          />
        </div>

        <a
          href="/admin/users"
          data-on:click__prevent="@get('/admin/users')"
          class="hidden sm:inline-block text-sm text-slate-500 hover:text-slate-700"
          title="Admin users"
          >Users</a
        >
        <a
          href="/kitchen"
          data-on:click__prevent="@get('/kitchen')"
          class="hidden sm:inline-block text-sm text-slate-500 hover:text-slate-700"
          title="Kitchen dashboard"
          >Kitchen</a
        >
        <a
          href="/delivery"
          data-on:click__prevent="@get('/delivery')"
          class="hidden sm:inline-block text-sm text-slate-500 hover:text-slate-700"
          title="Delivery dashboard"
          >Delivery</a
        >
        <a
          href="/orders"
          data-on:click__prevent="@get('/orders')"
          class="hidden sm:inline-block text-sm text-slate-500 hover:text-slate-700"
          title="Your orders"
          >Orders</a
        >

        <button
          type="button"
          data-on:click="$cartOpen = true"
          class="relative p-2 rounded-lg hover:bg-slate-100 transition cursor-pointer"
          title="Cart"
        >
          <svg
            class="w-6 h-6 text-slate-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"
            />
          </svg>
          <span
            id="cart-badge"
            class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center"
            data-init="@get('/cart/badge')"
            >0</span
          >
        </button>

        <div
          id="user-menu"
          class="flex items-center"
          data-init="@get('/auth/user-menu')"
        ></div>
      </div>
    </nav>

    <div data-show="$cartOpen" class="fixed inset-0 z-50 fade-in">
      <div
        data-on:click="$cartOpen = false"
        class="absolute inset-0 bg-black/40 cursor-pointer"
      ></div>
      <div
        id="cart-drawer"
        class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl"
        data-effect="$cartOpen && @get('/cart/drawer')"
      >
        <div class="p-6 text-center text-slate-400 text-sm">Loading cart…</div>
      </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
      <aside
        id="category-list"
        class="w-56 min-w-[14rem] bg-white border-r border-slate-200 overflow-y-auto shrink-0"
        data-init="@get('/categories')"
      ></aside>

      <main id="content" class="flex-1 overflow-y-auto">
        <div class="p-4 lg:p-6">
          <div
            class="flex items-center justify-center py-20 text-slate-400 text-sm"
          >
            Loading products…
          </div>
        </div>
      </main>
    </div>

    <footer
      class="border-t border-slate-200 py-4 text-center text-xs text-slate-400 bg-white shrink-0"
    >
      ePizza &middot; Powered by Planck &middot; schnell + Datastar + Tailwind
    </footer>

</html>
